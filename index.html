<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>St.7 รับทราบงาน GM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Anuphan', sans-serif; background-color: #f8fafc; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body class="pb-24">

  <div class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white px-4 py-5 shadow-md sticky top-0 z-50">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-base font-bold tracking-wide flex items-center gap-1.5">St.7 รับทราบงาน GM</h1>
        <p id="user-info" class="text-[11px] text-blue-100 mt-0.5 opacity-90">Makro Nakhonratchasima 1</p>
      </div>
      <button onclick="toggleGMRole()" id="gm-toggle-btn" class="text-xs font-bold bg-white/15 hover:bg-white/25 text-white px-3.5 py-2 rounded-xl backdrop-blur-md border border-white/10 shadow-inner active:scale-95 transition flex items-center gap-1.5">
        <span>เข้าสู่ระบบ</span>
      </button>
    </div>
  </div>

  <div class="max-w-md mx-auto px-4 mt-4">
    <div id="gm-tabs" class="hidden flex bg-slate-200 p-1 rounded-xl mb-4 gap-1">
      <button onclick="switchTab('create')" id="tab-create-btn" class="flex-1 text-center font-bold text-xs py-2.5 rounded-lg bg-white text-slate-800 shadow-sm transition">➕ สร้างเรื่องแจ้งงาน</button>
      <button onclick="switchTab('dashboard')" id="tab-dashboard-btn" class="flex-1 text-center font-bold text-xs py-2.5 rounded-lg text-slate-600 hover:text-slate-900 transition">📋 บอร์ดงานและสถิติ</button>
    </div>

    <div id="global-dashboard-stats" class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white rounded-2xl p-5 shadow-xl mb-6 border border-slate-700/40">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">📊 สรุปความคืบหน้าภาพรวมสาขา</h3>
        <span class="text-[10px] bg-emerald-500/20 text-emerald-400 font-bold px-2 py-0.5 rounded-full border border-emerald-500/30">Realtime</span>
      </div>
      
      <div class="flex items-center gap-5">
        <div class="relative flex items-center justify-center shrink-0 w-20 h-20">
          <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
            <path class="text-slate-700" stroke-width="3" stroke="currentColor" fill="transparent" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
            <path id="stat-svg-circle" class="text-emerald-400 transition-all duration-1000 ease-out" stroke-dasharray="0, 100" stroke-linecap="round" stroke-width="3.5" stroke="currentColor" fill="transparent" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          </svg>
          <div class="absolute text-center">
            <span id="total-ack-percent" class="text-lg font-black text-white">0%</span>
            <span class="block text-[8px] text-slate-400 font-medium -mt-1">สำเร็จ</span>
          </div>
        </div>

        <div class="grid grid-cols-3 gap-2 flex-1 text-center">
          <div class="bg-slate-800/60 p-2 rounded-xl border border-slate-700/30">
            <span class="block text-[9px] font-bold text-slate-400 mb-0.5">📝ทั้งหมด</span>
            <span id="stat-total-topics" class="text-base font-extrabold text-blue-400">0</span>
          </div>
          <div class="bg-slate-800/60 p-2 rounded-xl border border-slate-700/30">
            <span class="block text-[9px] font-bold text-slate-400 mb-0.5">🟢รับทราบแล้ว</span>
            <span id="stat-read-count" class="text-base font-extrabold text-emerald-400">0</span>
          </div>
          <div class="bg-slate-800/60 p-2 rounded-xl border border-slate-700/30">
            <span class="block text-[9px] font-bold text-slate-400 mb-0.5">⏳รอรับทราบ</span>
            <span id="stat-pending-groups" class="text-base font-extrabold text-amber-400">0</span>
          </div>
        </div>
      </div>
    </div>

    <div id="view-create-job" class="hidden bg-white rounded-2xl p-5 shadow-sm border border-slate-200 mb-6">
      <h2 class="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2">➕ สร้างหัวข้อเรื่องแจ้งงานใหม่</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">หัวข้อเรื่อง</label>
          <input type="text" id="job-title" placeholder="เช่น แจ้งนโยบายมาตรการความปลอดภัยใหม่" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">รายละเอียดงาน / คำสั่ง</label>
          <textarea id="job-detail" rows="4" placeholder="ระบุข้อความอธิบายคำสั่งงานที่นี่..." class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-2">👥 เลือกกลุ่มบุคคลที่ต้องให้รับทราบ (เลือกได้มากกว่า 1)</label>
          <div id="target-group-checkboxes" class="grid grid-cols-2 gap-2 bg-slate-50 p-3 rounded-xl border border-slate-100"></div>
        </div>
        <button onclick="submitJob()" id="submit-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl text-sm shadow-md shadow-blue-100 hover:bg-blue-700 transition">🚀 ส่งเรื่องแจ้งงานตามกลุ่ม</button>
      </div>
    </div>

    <div id="view-dashboard">
      <h2 id="list-header" class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">📋 รายการแจ้งงานล่าสุด</h2>
      <div id="task-list" class="space-y-4">
        <div class="text-center py-8 text-slate-400 text-xs">กำลังโหลดข้อมูลรายการงาน...</div>
      </div>
    </div>

  </div>

  <div id="ack-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
      <h3 class="text-sm font-bold text-slate-800 mb-1">✍️ เซ็นรับทราบงานรายบุคคล</h3>
      <p id="modal-task-title" class="text-xs text-blue-600 font-medium mb-4">เรื่อง: ...</p>
      <input type="hidden" id="modal-topic-id">
      
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">1. เลือกกลุ่มตำแหน่งของคุณ</label>
          <select id="modal-group-select" class="w-full px-3 py-2.5 border border-slate-200 rounded-xl text-sm bg-white focus:ring-2 focus:ring-emerald-500 focus:outline-none"></select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">2. พิมพ์ชื่อ-แผนกของคุณ</label>
          <input type="text" id="modal-sm-input-name" placeholder="เช่น ข้าวหอม DF" class="w-full px-3 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
        </div>
        <div class="flex gap-2 pt-2">
          <button onclick="closeAckModal()" class="w-1/3 bg-slate-100 text-slate-600 font-medium py-2.5 rounded-xl text-sm">ยกเลิก</button>
          <button onclick="submitAck()" id="modal-submit-btn" class="w-2/3 bg-emerald-500 text-white font-bold py-2.5 rounded-xl text-sm shadow-md">✅ ยืนยันรับทราบงาน</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxFC0-0w1bLgHexpjxYi_aTMNYCD6no1rXA28h5xgM3-bAfWXAFNhZQu45vePrilr-jBg/exec"; 
    let isGM = false;
    let currentTasks = []; 

    const DEFINED_GROUPS = ["Section manager", "Supervisor", "Staff2", "Staff1", "Adecco", "PC", "แม่บ้าน"];

    window.onload = function() {
      loadData();
      renderGroupCheckboxes();
    };

    function renderGroupCheckboxes() {
      let html = '';
      DEFINED_GROUPS.forEach(group => {
        html += `
          <label class="flex items-center gap-2 bg-white p-2 rounded-lg border border-slate-200 cursor-pointer hover:bg-blue-50/50 transition truncate">
            <input type="checkbox" name="target-group" value="${group}" class="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500 shrink-0">
            <span class="text-xs text-slate-700 font-medium truncate">${group}</span>
          </label>
        `;
      });
      document.getElementById('target-group-checkboxes').innerHTML = html;
    }

    function toggleGMRole() {
      if (!isGM) {
        let password = prompt("กรุณากรอกรหัสผ่านสำหรับสิทธิ์ GM:");
        if (password === "1234") {
          isGM = true;
          document.getElementById('gm-toggle-btn').innerHTML = "<span>ออกจากระบบ</span>";
          document.getElementById('gm-toggle-btn').className = "text-xs font-bold bg-red-500 hover:bg-red-600 text-white px-3.5 py-2 rounded-xl shadow-md active:scale-95 transition flex items-center gap-1.5";
          document.getElementById('user-info').innerText = "โหมดผู้ใช้งาน: คุณชุลีวัลย์ (GM)";
          document.getElementById('gm-tabs').classList.remove('hidden'); 
          document.getElementById('list-header').innerText = "📊 รายการงานและสถิติรายชิ้นงาน";
          switchTab('create');
        } else if (password !== null) { alert("รหัสผ่านไม่ถูกต้อง!"); }
      } else {
        isGM = false;
        document.getElementById('gm-toggle-btn').innerHTML = "<span>เข้าสู่ระบบ</span>";
        document.getElementById('gm-toggle-btn').className = "text-xs font-bold bg-white/15 hover:bg-white/25 text-white px-3.5 py-2 rounded-xl backdrop-blur-md border border-white/10 shadow-inner active:scale-95 transition flex items-center gap-1.5";
        document.getElementById('user-info').innerText = "Makro Nakhonratchasima 1";
        document.getElementById('gm-tabs').classList.add('hidden'); 
        document.getElementById('list-header').innerText = "📋 รายการแจ้งงานล่าสุด";
        clearGMForm();
        switchTab('dashboard');
      }
    }

    function clearGMForm() {
      document.getElementById('job-title').value = '';
      document.getElementById('job-detail').value = '';
      document.querySelectorAll('input[name="target-group"]:checked').forEach(cb => cb.checked = false);
    }

    function switchTab(view) {
      const createTab = document.getElementById('tab-create-btn');
      const dashTab = document.getElementById('tab-dashboard-btn');
      const createView = document.getElementById('view-create-job');
      const dashView = document.getElementById('view-dashboard');
      const statsBlock = document.getElementById('global-dashboard-stats');

      if (!isGM) {
        createView.classList.add('hidden');
        dashView.classList.remove('hidden'); // แก้ไขจาก .remove() เป็น .classList.remove()
        statsBlock.classList.remove('hidden');
        return;
      }

      if(view === 'create') {
        createTab.className = "flex-1 text-center font-bold text-xs py-2.5 rounded-lg bg-white text-slate-800 shadow-sm transition";
        dashTab.className = "flex-1 text-center font-bold text-xs py-2.5 rounded-lg text-slate-600 hover:text-slate-900 transition";
        createView.classList.remove('hidden');
        dashView.classList.add('hidden');
        statsBlock.classList.add('hidden');
      } else if(view === 'dashboard') {
        dashTab.className = "flex-1 text-center font-bold text-xs py-2.5 rounded-lg bg-white text-slate-800 shadow-sm transition";
        createTab.className = "flex-1 text-center font-bold text-xs py-2.5 rounded-lg text-slate-600 hover:text-slate-900 transition";
        createView.classList.add('hidden');
        dashView.classList.remove('hidden');
        statsBlock.classList.remove('hidden');
        loadData();
      }
    }

    function loadData() {
      const roleQuery = isGM ? 'GM' : 'SM';
      fetch(`${API_URL}?action=getDashboardData&clientRole=${roleQuery}`)
        .then(res => res.json())
        .then(data => { 
          if (data && data.error) throw new Error(data.message);
          currentTasks = data.tasks || [];
          calculateGlobalStats(currentTasks); 
          renderTasks(currentTasks); 
        })
        .catch(err => {
          document.getElementById('task-list').innerHTML = `<div class="text-center py-8 text-rose-500 text-xs">เกิดข้อผิดพลาดในการโหลดข้อมูล: ${err.message}</div>`;
        });
    }

    function calculateGlobalStats(tasks) {
      if (!tasks || tasks.length === 0) {
        document.getElementById('total-ack-percent').innerText = `0%`;
        document.getElementById('stat-read-count').innerText = 0;
        document.getElementById('stat-total-topics').innerText = 0;
        document.getElementById('stat-pending-groups').innerText = 0;
        document.getElementById('stat-svg-circle').setAttribute("stroke-dasharray", "0, 100");
        return;
      }
      
      let totalAssignments = 0; 
      let totalRead = 0;
      let pendingGroupsCount = 0;

      tasks.forEach(task => {
        if(task.assignments) {
          task.assignments.forEach(assign => {
            if (assign.status === 'รับทราบแล้ว') {
              totalRead++;
              totalAssignments++;
            } else if (assign.status === 'รอยืนยัน') {
              totalAssignments++;
              pendingGroupsCount++;
            }
          });
        }
      });
      
      let percent = totalAssignments > 0 ? Math.round((totalRead / totalAssignments) * 100) : 0;
      
      document.getElementById('total-ack-percent').innerText = `${percent}%`;
      document.getElementById('stat-read-count').innerText = totalRead;
      document.getElementById('stat-total-topics').innerText = tasks.length;
      document.getElementById('stat-pending-groups').innerText = pendingGroupsCount;
      document.getElementById('stat-svg-circle').setAttribute("stroke-dasharray", `${percent}, 100`);
    }

    function generateGroupStatsHtml(topicId, groupStats, assignments) {
      if (!groupStats) return '';
      
      let activeStats = groupStats.filter(stat => stat.isTarget);
      
      if (activeStats.length === 0) {
        return `<div class="text-xs text-slate-400 bg-slate-50 p-2.5 rounded-xl border text-center">ไม่ได้ระบุกลุ่มเป้าหมาย</div>`;
      }

      let html = '<div class="grid grid-cols-2 gap-2 mt-1.5 mb-2.5">';
      
      activeStats.forEach((stat, idx) => {
        let groupUsers = assignments ? assignments.filter(a => a.group === stat.groupName && a.status === 'รับทราบแล้ว') : [];
        let collapseId = `list-${topicId}-${idx}`;

        html += `
          <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm hover:border-blue-300 transition">
            <button onclick="toggleDetails('${collapseId}')" class="w-full bg-emerald-50/70 hover:bg-emerald-100/80 px-2.5 py-2 flex justify-between items-center transition focus:outline-none overflow-hidden">
              <span class="text-[11px] font-bold text-slate-700 flex items-center gap-0.5 truncate mr-1">
                <span class="truncate">👥 ${stat.groupName}</span>
                <svg class="w-2.5 h-2.5 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
              </span>
              <span class="text-[10px] font-extrabold text-emerald-600 bg-white px-1.5 py-0.5 rounded-md border border-emerald-100 shrink-0 whitespace-nowrap">${stat.ackCount} คน</span>
            </button>

            <div id="${collapseId}" class="hidden p-1.5 bg-slate-50/50 border-t border-slate-100 space-y-1 max-h-36 overflow-y-auto">
        `;

        if (groupUsers.length === 0) {
          html += `<div class="text-[10px] text-slate-400 text-center py-1">ยังไม่มีใครยืนยัน</div>`;
        } else {
          groupUsers.forEach(user => {
            html += `
              <div class="bg-white p-1.5 rounded border border-slate-100 text-slate-600 flex justify-between items-center gap-2 overflow-hidden">
                <div class="text-[10px] font-bold truncate flex-1">👤 ${user.name}</div>
                <div class="text-[9px] text-slate-400 font-semibold tracking-tight shrink-0 whitespace-nowrap text-right">📅 ${user.time}</div>
              </div>
            `;
          });
        }

        html += `</div></div>`;
      });
      
      html += '</div>';
      return html;
    }

    function renderTasks(tasks) {
      let html = '';
      if(!tasks || tasks.length === 0) {
        html = '<div class="bg-white p-6 rounded-2xl text-center text-slate-400 text-xs border">ยังไม่มีการแจ้งเรื่องในขณะนี้</div>';
      } else {
        tasks.forEach(task => {
          let totalReadCount = task.assignments ? task.assignments.filter(a => a.status === 'รับทราบแล้ว').length : 0;

          html += `
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 shadow-slate-100/50">
              <div class="flex justify-between items-start gap-2 mb-2">
                <h3 class="font-bold text-slate-800 text-sm sm:text-base leading-snug">${task.title}</h3>
                <div class="text-right whitespace-nowrap shrink-0">
                  <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md border border-blue-100">อ่านแล้ว ${totalReadCount} คน</span>
                </div>
              </div>
              
              <p class="text-xs sm:text-sm text-slate-600 bg-slate-50 p-3 rounded-xl mb-3 whitespace-pre-wrap leading-relaxed">${task.detail}</p>
              
              <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">📊 สถิติรับทราบ (คลิกที่กลุ่มเพื่อดูรายชื่อ):</div>
              ${generateGroupStatsHtml(task.id, task.groupStats, task.assignments)}

              <div class="text-[10px] text-slate-400 mt-2">โดย: ${task.createdBy} | เมื่อ: ${task.createdAt}</div>
          `;

          if (!isGM) {
            html += `
              <button onclick="openAckModal('${task.id}', '${task.title}')" class="w-full bg-emerald-500 text-white font-bold py-2.5 rounded-xl text-xs shadow-md shadow-emerald-100 mt-2.5">
                ✅ ฉันรับทราบเรื่องนี้แล้ว
              </button>
            `;
          }
          
          html += `</div>`;
        });
      }
      document.getElementById('task-list').innerHTML = html;
    }

    function toggleDetails(elementId) { document.getElementById(elementId).classList.toggle('hidden'); }

    function openAckModal(topicId, title) {
      document.getElementById('modal-topic-id').value = topicId;
      document.getElementById('modal-task-title').innerText = `เรื่อง: ${title}`;
      document.getElementById('modal-sm-input-name').value = ''; 
      
      const targetTask = currentTasks.find(t => t.id === topicId);
      let groupSelect = document.getElementById('modal-group-select');
      
      let allowedGroups = [];
      if (targetTask && targetTask.assignments) {
        targetTask.assignments.forEach(assign => {
          if (assign.group && !allowedGroups.includes(assign.group)) {
            allowedGroups.push(assign.group);
          }
        });
      }

      let groupHtml = '<option value="">-- เลือกกลุ่มตำแหน่งของคุณ --</option>';
      if (allowedGroups.length > 0) {
        allowedGroups.forEach(g => { groupHtml += `<option value="${g}">${g}</option>`; });
      } else {
        groupHtml = '<option value="">-- ใบงานนี้ไม่ระบุกลุ่มเป้าหมาย --</option>';
      }
      
      groupSelect.innerHTML = groupHtml;
      document.getElementById('ack-modal').classList.remove('hidden');
    }

    function closeAckModal() { document.getElementById('ack-modal').classList.add('hidden'); }

    function submitAck() {
      const topicId = document.getElementById('modal-topic-id').value;
      const selectedGroup = document.getElementById('modal-group-select').value;
      const typedName = document.getElementById('modal-sm-input-name').value.trim();

      if (!selectedGroup) { alert('กรุณาเลือกกลุ่มตำแหน่งของคุณก่อนครับ'); return; }
      if (!typedName) { alert('กรุณาพิมพ์ชื่อ-นามสกุลจริงของคุณลงในช่องค้นหาด้วยครับ'); return; }

      const btn = document.getElementById('modal-submit-btn');
      btn.disabled = true; btn.innerText = 'กำลังบันทึกข้อมูล...';

      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'acknowledgeTask', topicId: topicId, smName: typedName, userGroup: selectedGroup })
      })
      .then(res => res.json())
      .then(res => {
        btn.disabled = false; btn.innerText = '✅ ยืนยันรับทราบงาน';
        if (res.success) { 
          alert('บันทึกการรับทราบเรียบร้อยแล้ว!'); 
          closeAckModal(); 
          loadData(); 
        } else { alert(res.message); }
      })
      .catch(err => {
        btn.disabled = false; btn.innerText = '✅ ยืนยันรับทราบงาน';
        alert('เกิดข้อผิดพลาด: ' + err.message);
      });
    }

    function submitJob() {
      let title = document.getElementById('job-title').value;
      let detail = document.getElementById('job-detail').value;
      let checkedGroups = [];
      document.querySelectorAll('input[name="target-group"]:checked').forEach(cb => { checkedGroups.push(cb.value); });

      if(!title || !detail || checkedGroups.length === 0) { alert('กรุณากรอกข้อมูลและเลือกกลุ่มผู้รับทราบอย่างน้อย 1 กลุ่ม'); return; }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.innerText = 'กำลังส่งระบบ...';

      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'createTopic', title: title, detail: detail, targetGroups: checkedGroups })
      })
      .then(res => res.json())
      .then(res => {
        clearGMForm();
        btn.disabled = false; btn.innerText = '🚀 ส่งเรื่องแจ้งงานตามกลุ่ม';
        switchTab('dashboard');
        alert('ส่งเรื่องแจ้งงานไปยังกลุ่มพนักงานเรียบร้อยแล้ว!');
      })
      .catch(err => {
        btn.disabled = false; btn.innerText = '🚀 ส่งเรื่องแจ้งงานตามกลุ่ม';
        alert('เกิดข้อผิดพลาด: ' + err.message);
      });
    }
  </script>
</body>
</html>
